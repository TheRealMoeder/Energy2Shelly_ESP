<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Energy2Shelly ESP Installer</title>

  <script type="module" src="https://unpkg.com/esp-web-tools@9/dist/web/install-button.js?module"></script>

  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --accent: #3b82f6;
      --text: #e5e7eb;
      --muted: #94a3b8;
    }

    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: linear-gradient(135deg, #020617, #0f172a);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      text-align: center;
      padding: 50px 20px 20px;
    }

    h1 {
      margin: 0;
      font-size: 2.5rem;
    }

    .version {
      color: var(--muted);
      margin-top: 8px;
    }

    .lang {
      margin-top: 10px;
    }

    select {
      padding: 6px;
      border-radius: 6px;
      border: none;
    }

    .container {
      width: 100%;
      max-width: 500px;
      padding: 20px;
    }

    .card {
      background: var(--card);
      border-radius: 16px;
      padding: 30px;
      text-align: center;
    }

    button {
      width: 100%;
      padding: 16px;
      font-size: 1.1rem;
      border-radius: 12px;
      border: none;
      background: var(--accent);
      color: white;
      cursor: pointer;
    }

    button.secondary {
      margin-top: 12px;
      background: #334155;
    }

    .info {
      margin-top: 15px;
      font-size: 0.9rem;
      color: var(--muted);
    }

    /* Modal */
    #downloadModal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: #1e293b;
      padding: 20px;
      border-radius: 14px;
      width: 320px;
      text-align: center;
    }

    .chipBtn {
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: #0f172a;
      color: white;
      cursor: pointer;
    }

    .chipBtn:hover {
      background: #2563eb;
    }

    .chip-grid {
      display: grid;
      gap: 10px;
      margin-top: 15px;
    }
  </style>
</head>

<body>

<header>
  <h1 id="title">Energy2Shelly ESP Installer</h1>
  <div class="version" id="version">...</div>

  <div class="lang">
    <select id="lang">
      <option value="en">English</option>
      <option value="de">Deutsch</option>
    </select>
  </div>
</header>

<div class="container">
  <div class="card">

    <esp-web-install-button manifest="manifest.json">
      <button slot="activate" id="installText">
        Connect & Install
      </button>
    </esp-web-install-button>

    <button id="downloadBtn" class="secondary">
      Download Firmware (.bin)
    </button>

    <div class="info" id="hint">
      Use Chrome or Edge • USB required
    </div>

  </div>
</div>

<!-- Modal -->
<div id="downloadModal">
  <div class="modal-content">
    <h3 id="modalTitle">Select Device</h3>

    <div class="chip-grid">
      <button class="chipBtn" data-file="esp32.bin">ESP32</button>
      <button class="chipBtn" data-file="esp32-s3.bin">ESP32-S3</button>
      <button class="chipBtn" data-file="esp32-c3.bin">ESP32-C3</button>
      <button class="chipBtn" data-file="esp8266.bin">ESP8266</button>
    </div>

    <button id="closeModal" class="secondary">
      Cancel
    </button>
  </div>
</div>

<script>
/* 🌍 i18n */
const i18n = {
  en: {
    title: "Energy2Shelly ESP Installer",
    install: "Connect & Install",
    download: "Download Firmware (.bin)",
    hint: "Use Chrome or Edge • USB required",
    modal: "Select Device",
    cancel: "Cancel"
  },
  de: {
    title: "Energy2Shelly ESP Installer",
    install: "Verbinden & Installieren",
    download: "Firmware herunterladen (.bin)",
    hint: "Chrome oder Edge • USB erforderlich",
    modal: "Gerät auswählen",
    cancel: "Abbrechen"
  }
};

function setLang(lang) {
  document.getElementById("title").innerText = i18n[lang].title;
  document.getElementById("installText").innerText = i18n[lang].install;
  document.getElementById("downloadBtn").innerText = i18n[lang].download;
  document.getElementById("hint").innerText = i18n[lang].hint;
  document.getElementById("modalTitle").innerText = i18n[lang].modal;
  document.getElementById("closeModal").innerText = i18n[lang].cancel;
}

document.getElementById("lang").addEventListener("change", e => {
  setLang(e.target.value);
});

setLang("en");

/* 📦 version */
fetch("manifest.json")
  .then(r => r.json())
  .then(data => {
    document.getElementById("version").innerText =
      "Version: " + (data.version || "dev");
  })
  .catch(() => {
    document.getElementById("version").innerText = "Version: unknown";
  });

/* 📥 modal logic */
const modal = document.getElementById("downloadModal");

document.getElementById("downloadBtn").addEventListener("click", () => {
  modal.style.display = "flex";
});

document.getElementById("closeModal").addEventListener("click", () => {
  modal.style.display = "none";
});

document.querySelectorAll(".chipBtn").forEach(btn => {
  btn.addEventListener("click", () => {
    const file = btn.dataset.file;

    const link = document.createElement("a");
    link.href = file;
    link.download = file;
    link.click();

    modal.style.display = "none";
  });
});

modal.addEventListener("click", (e) => {
  if (e.target === modal) {
    modal.style.display = "none";
  }
});
</script>

</body>
</html>
